<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Self-Evolving Agent</title>
  <style>
    /* ── Reset & base ─────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d1117;
      --surface:   #161b22;
      --border:    #30363d;
      --text:      #e6edf3;
      --muted:     #8b949e;
      --blue:      #58a6ff;
      --green:     #3fb950;
      --red:       #f85149;
      --yellow:    #e3b341;
      --purple:    #d2a8ff;
      --orange:    #f0883e;
      --cyan:      #79c0ff;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ──────────────────────────────────── */
    header {
      padding: 12px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
      background: var(--surface);
    }

    .logo { font-size: 1.4rem; }

    header h1 {
      font-size: 1.05rem;
      font-weight: 600;
      letter-spacing: -0.3px;
    }

    .status-wrap {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--green);
      flex-shrink: 0;
    }
    .dot.running {
      background: var(--orange);
      animation: pulse 1.2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.5; transform: scale(0.85); }
    }

    #statusText { font-size: 0.8rem; color: var(--muted); }

    /* ── Layout ──────────────────────────────────── */
    .layout {
      flex: 1;
      display: grid;
      grid-template-columns: 280px 1fr;
      overflow: hidden;
    }

    /* ── Sidebar ─────────────────────────────────── */
    .sidebar {
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--surface);
    }

    .sidebar-section {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
    }

    .sidebar-section h2 {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--muted);
      margin-bottom: 10px;
    }

    label {
      display: block;
      font-size: 0.75rem;
      color: var(--muted);
      margin-bottom: 4px;
    }

    input[type="password"],
    input[type="text"],
    select {
      width: 100%;
      padding: 7px 10px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 0.85rem;
      transition: border-color 0.15s;
    }
    input:focus, select:focus {
      outline: none;
      border-color: var(--blue);
    }

    .field { margin-bottom: 10px; }
    .field:last-child { margin-bottom: 0; }

    /* ── Tool list ───────────────────────────────── */
    .tool-list {
      flex: 1;
      overflow-y: auto;
      padding: 0 16px 12px;
    }

    .tool-list h2 {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--muted);
      padding: 14px 0 8px;
      position: sticky;
      top: 0;
      background: var(--surface);
    }

    .tool-item {
      padding: 6px 8px;
      border-radius: 5px;
      cursor: default;
      transition: background 0.1s;
    }
    .tool-item:hover { background: rgba(255,255,255,0.04); }

    .tool-name {
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--cyan);
      font-family: 'Cascadia Code', 'Fira Code', monospace;
    }
    .tool-desc {
      font-size: 0.72rem;
      color: var(--muted);
      margin-top: 1px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ── Workspace file list ─────────────────────── */
    .ws-section {
      border-top: 1px solid var(--border);
      padding: 10px 16px;
      max-height: 160px;
      overflow-y: auto;
    }

    .ws-section h2 {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .ws-file {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 3px 0;
      font-size: 0.75rem;
    }
    .ws-file span { color: var(--text); font-family: monospace; }
    .ws-file small { color: var(--muted); }

    /* ── Main panel ──────────────────────────────── */
    .main {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .input-area {
      padding: 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 10px;
      flex-shrink: 0;
      background: var(--surface);
    }

    #goalInput {
      flex: 1;
      padding: 10px 14px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 0.95rem;
      resize: none;
      min-height: 58px;
      max-height: 120px;
      transition: border-color 0.15s;
      line-height: 1.4;
    }
    #goalInput::placeholder { color: var(--muted); }
    #goalInput:focus { outline: none; border-color: var(--blue); }

    .btn-group { display: flex; flex-direction: column; gap: 6px; }

    .btn {
      padding: 9px 18px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 500;
      white-space: nowrap;
      transition: background 0.15s, opacity 0.15s;
    }
    .btn:active { opacity: 0.8; }

    .btn-run {
      background: #238636;
      color: #fff;
    }
    .btn-run:hover { background: #2ea043; }
    .btn-run.stop {
      background: #da3633;
    }
    .btn-run.stop:hover { background: #f85149; }

    .btn-clear {
      background: #21262d;
      color: var(--text);
    }
    .btn-clear:hover { background: var(--border); }

    /* ── Output ──────────────────────────────────── */
    #output {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      scroll-behavior: smooth;
    }

    .placeholder {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: var(--border);
      user-select: none;
    }
    .placeholder-icon { font-size: 2.5rem; }
    .placeholder-text { font-size: 0.9rem; }

    /* ── Message cards ───────────────────────────── */
    .msg {
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 0.825rem;
      line-height: 1.55;
      white-space: pre-wrap;
      word-break: break-word;
      animation: fadeIn 0.15s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg-log     { color: var(--muted); }
    .msg-thought { color: var(--cyan);   background: rgba(121,192,255,0.07);  border-left: 3px solid var(--cyan);   font-style: italic; }
    .msg-tool    { color: var(--purple); background: rgba(210,168,255,0.07);  border-left: 3px solid var(--purple); font-family: 'Cascadia Code','Fira Code',monospace; }
    .msg-result  { color: var(--muted);  background: rgba(255,255,255,0.03);  border-left: 3px solid var(--border); font-family: monospace; }
    .msg-planning{ color: var(--yellow); background: rgba(227,179,65,0.07);   border-left: 3px solid var(--yellow); }
    .msg-success { color: var(--green);  background: rgba(63,185,80,0.07);    border-left: 3px solid var(--green);  font-weight: 500; }
    .msg-warning { color: var(--orange); background: rgba(240,136,62,0.07);   border-left: 3px solid var(--orange); }
    .msg-error   { color: var(--red);    background: rgba(248,81,73,0.07);    border-left: 3px solid var(--red);    font-family: monospace; font-size: 0.78rem; }
    .msg-synth   { color: #ff9580;      background: rgba(255,149,128,0.07);  border-left: 3px solid #ff9580; }
    .msg-memory  { color: var(--purple); background: rgba(210,168,255,0.05);  border-left: 3px solid rgba(210,168,255,0.4); }

    .msg-done {
      color: var(--green);
      background: rgba(63,185,80,0.1);
      border: 1px solid rgba(63,185,80,0.3);
      border-radius: 8px;
      padding: 14px 16px;
      font-weight: 500;
      font-size: 0.9rem;
    }

    /* ── Thinking animation ──────────────────────── */
    .thinking {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 0.8rem;
      padding: 4px 0;
    }
    .thinking-dots span {
      display: inline-block;
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--muted);
      margin: 0 1px;
      animation: bounce 1.4s ease-in-out infinite;
    }
    .thinking-dots span:nth-child(1) { animation-delay: 0s; }
    .thinking-dots span:nth-child(2) { animation-delay: 0.2s; }
    .thinking-dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: scale(1);   opacity: 0.4; }
      40%            { transform: scale(1.4); opacity: 1;   }
    }

    /* ── Scrollbar ───────────────────────────────── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--muted); }
  </style>
</head>
<body>

<!-- ── Header ─────────────────────────────────── -->
<header>
  <span class="logo">🤖</span>
  <h1>Self-Evolving Agent</h1>
  <div class="status-wrap">
    <div class="dot" id="dot"></div>
    <span id="statusText">Ready</span>
  </div>
</header>

<!-- ── Layout ─────────────────────────────────── -->
<div class="layout">

  <!-- ── Sidebar ─────────────────────────────── -->
  <aside class="sidebar">

    <!-- Settings -->
    <div class="sidebar-section">
      <h2>Settings</h2>
      <div class="field">
        <label>OpenAI API Key</label>
        <input type="password" id="apiKey"
               placeholder="sk-… (or set env var)" />
      </div>
      <div class="field">
        <label>Model</label>
        <select id="model">
          <option value="gpt-4o-mini">gpt-4o-mini  (fast · cheap)</option>
          <option value="gpt-4o">gpt-4o</option>
          <option value="gpt-4-turbo">gpt-4-turbo</option>
          <option value="gpt-3.5-turbo">gpt-3.5-turbo</option>
        </select>
      </div>
    </div>

    <!-- Tool list -->
    <div class="tool-list">
      <h2>Available Tools</h2>
      <div id="toolList">
        <div style="color:var(--muted);font-size:0.78rem;">Loading…</div>
      </div>
    </div>

    <!-- Workspace files -->
    <div class="ws-section">
      <h2>Workspace Files</h2>
      <div id="wsFiles">
        <div style="color:var(--muted);font-size:0.78rem;">Loading…</div>
      </div>
    </div>

  </aside>

  <!-- ── Main panel ──────────────────────────── -->
  <div class="main">

    <!-- Goal input -->
    <div class="input-area">
      <textarea id="goalInput" rows="2"
        placeholder="Enter a goal, e.g. 'Make a snake game in Python'  (Ctrl+Enter to run)"></textarea>
      <div class="btn-group">
        <button class="btn btn-run" id="runBtn" onclick="runAgent()">▶ Run</button>
        <button class="btn btn-clear" onclick="clearOutput()">Clear</button>
      </div>
    </div>

    <!-- Streaming output -->
    <div id="output">
      <div class="placeholder" id="placeholder">
        <div class="placeholder-icon">🎯</div>
        <div class="placeholder-text">Enter a goal above and click Run</div>
      </div>
    </div>

  </div>
</div>

<!-- ── Script ──────────────────────────────────── -->
<script>
  let evtSrc = null;
  let running = false;

  const output    = document.getElementById("output");
  const runBtn    = document.getElementById("runBtn");
  const dot       = document.getElementById("dot");
  const statusTxt = document.getElementById("statusText");
  const placeholder = document.getElementById("placeholder");

  // ── Sidebar data ──────────────────────────────
  async function loadSidebar() {
    try {
      const [tRes, wRes] = await Promise.all([
        fetch("/tools").then(r => r.json()),
        fetch("/workspace").then(r => r.json()),
      ]);

      const toolList = document.getElementById("toolList");
      toolList.innerHTML = "";
      (tRes.tools || []).forEach(t => {
        const div = document.createElement("div");
        div.className = "tool-item";
        div.innerHTML =
          `<div class="tool-name">${t.name}</div>` +
          `<div class="tool-desc" title="${t.description}">${t.description}</div>`;
        toolList.appendChild(div);
      });

      renderWorkspace(wRes.files || []);
    } catch {
      document.getElementById("toolList").innerHTML =
        '<div style="color:var(--muted);font-size:0.78rem;">Could not load tools</div>';
    }
  }

  function renderWorkspace(files) {
    const el = document.getElementById("wsFiles");
    if (!files.length) {
      el.innerHTML = '<div style="color:var(--muted);font-size:0.78rem;">Empty</div>';
      return;
    }
    el.innerHTML = files.map(f =>
      `<div class="ws-file"><span>${f.name}</span><small>${fmtSize(f.size)}</small></div>`
    ).join("");
  }

  function fmtSize(bytes) {
    if (bytes < 1024) return `${bytes} B`;
    if (bytes < 1048576) return `${(bytes / 1024).toFixed(1)} KB`;
    return `${(bytes / 1048576).toFixed(1)} MB`;
  }

  // ── Run / stop ────────────────────────────────
  function setRunning(on) {
    running = on;
    runBtn.textContent = on ? "⏹ Stop" : "▶ Run";
    runBtn.onclick     = on ? stopAgent : runAgent;
    runBtn.className   = "btn btn-run" + (on ? " stop" : "");
    dot.className      = "dot" + (on ? " running" : "");
    statusTxt.textContent = on ? "Running…" : "Ready";
  }

  function addMsg(type, text) {
    placeholder.style.display = "none";
    const div = document.createElement("div");
    div.className = `msg msg-${type}`;
    div.textContent = text;
    output.appendChild(div);
    output.scrollTop = output.scrollHeight;
    return div;
  }

  let thinkEl = null;

  function showThinking() {
    removeThinking();
    const div = document.createElement("div");
    div.className = "thinking";
    div.innerHTML = 'Agent working ' +
      '<span class="thinking-dots">' +
        '<span></span><span></span><span></span>' +
      '</span>';
    output.appendChild(div);
    output.scrollTop = output.scrollHeight;
    thinkEl = div;
  }

  function removeThinking() {
    if (thinkEl) { thinkEl.remove(); thinkEl = null; }
  }

  function clearOutput() {
    output.innerHTML = "";
    output.appendChild(placeholder);
    placeholder.style.display = "";
  }

  function stopAgent() {
    if (evtSrc) { evtSrc.close(); evtSrc = null; }
    removeThinking();
    setRunning(false);
    addMsg("warning", "⏹ Stopped by user.");
  }

  function runAgent() {
    const goal   = document.getElementById("goalInput").value.trim();
    const apiKey = document.getElementById("apiKey").value.trim();
    const model  = document.getElementById("model").value;

    if (!goal) { document.getElementById("goalInput").focus(); return; }

    if (evtSrc) { evtSrc.close(); evtSrc = null; }

    setRunning(true);
    addMsg("planning", `🎯 Goal: ${goal}`);
    showThinking();

    const params = new URLSearchParams({ goal, model });
    if (apiKey) params.append("api_key", apiKey);

    evtSrc = new EventSource(`/run?${params}`);

    evtSrc.onmessage = e => {
      const data = JSON.parse(e.data);

      if (data.type === "ping") return;

      if (data.type === "end") {
        removeThinking();
        setRunning(false);
        evtSrc.close(); evtSrc = null;
        // Refresh workspace files after a run
        fetch("/workspace").then(r => r.json()).then(d => renderWorkspace(d.files || []));
        return;
      }

      if (data.type === "done") {
        removeThinking();
        const div = document.createElement("div");
        div.className = "msg-done";
        div.textContent = `✅ ${data.text}`;
        output.appendChild(div);
        output.scrollTop = output.scrollHeight;
        return;
      }

      removeThinking();
      addMsg(data.type, data.text);
      showThinking();
    };

    evtSrc.onerror = () => {
      removeThinking();
      if (running) {
        setRunning(false);
        addMsg("error", "Connection lost. The agent may have finished or encountered an error.");
      }
      if (evtSrc) { evtSrc.close(); evtSrc = null; }
      // Refresh workspace files
      fetch("/workspace").then(r => r.json()).then(d => renderWorkspace(d.files || []));
    };
  }

  // Ctrl+Enter submits
  document.getElementById("goalInput").addEventListener("keydown", e => {
    if (e.key === "Enter" && (e.ctrlKey || e.metaKey)) runAgent();
  });

  // Load sidebar on page load
  loadSidebar();
</script>
</body>
</html>
